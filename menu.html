                // === УЛУЧШЕННАЯ НОРМАЛИЗАЦИЯ ДЛЯ АЛКОГОЛЯ ===
                function normalizeName(name) {
                    let normalized = name.toLowerCase().trim().replace(/\s+/g, ' ');
                    
                    // Маппинг коротких названий → полные ключи в getItemDetails
                    const alcoholAliasMap = {
                        'grey goose': 'grey goose 50 мл',
                        'absolut': 'absolut original 50 мл',

                        'oakheart': 'oakheart original 50 мл',

                        'ararat': 'ararat', 'beefeater': 'beefeater', 'olmeca tekila': 'olmeca tekila',
                        'heineken': 'heineken', 'jameson': 'jameson', 'cave de turckheim': 'cave de turckheim'
                    };
                    
                    const aliasMap = {
                        'боржоми': 'боржоми', 'borjomi': 'боржоми',
                        'тассай': 'tassay', 'tassay': 'tassay',
                        'cocacola 0.25l': 'cocacola 0.25l',
                        'cocacola 1l': 'cocacola 1l',
                        'кока-кола': 'cocacola', 'cocacola': 'cocacola',
                        'сан пеллегрино': 'san pellegrino', 'sanpellegrino': 'san pellegrino',
                        'пина колада': 'pina colada', 'pina colada': 'pina colada',
                        'лонг айленд': 'long island', 'long island': 'long island',
                        'латте': 'latte', 'latte': 'latte', 'ice latte': 'ice latte',
                        'эспрессо': 'эспрессо', 'каппучино': 'каппучино', 'американо': 'американо',
                        'тихий ирландец': 'тихий ирландец', 'клубничный алиби': 'клубничный алиби',
                        'мохито': 'мохито', 'mojito alc': 'мохито', 'дюшес': 'дюшес',
                        'ягодный': 'ягодный', 'верде фреш': 'verde fresh', 'раф классический': 'раф классический'
                    };
                    
                    // Сначала проверяем алкогольные алиасы
                    if (alcoholAliasMap[normalized]) {
                        return alcoholAliasMap[normalized];
                    }
                    // Затем общие алиасы
                    if (aliasMap[normalized]) {
                        normalized = aliasMap[normalized];
                    }
                    
                    // Очистка от объёмов и спецсимволов (но не для алкоголя!)
                    if (!alcoholAliasMap[normalized]) {
                        normalized = normalized.replace(/\s*\([^)]*\)/g, '').replace(/[.,]/g, '')
                            .replace(/\s+(мл|л|г|кг)\b/g, '').replace(/\b\d+[,.]?\d*\s*(мл|л|г|кг)?\b/g, '').trim();
                    }
                    return normalized;
                }

                function showModal(title, details) {
                    const modal = document.getElementById('descriptionModal');
                    document.getElementById('modalTitle').textContent = title;
                    document.getElementById('modalPrice').textContent = details.price || 'Цена по запросу';
                    document.getElementById('modalDescription').innerHTML = details.desc ? details.desc.replace(/\n/g, '<br>') : '';
                    modal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }

                function createMenuItem(category, item) {
                    const div = document.createElement('div');
                    div.className = 'menu-item';
                    const img = document.createElement('img');
                    img.className = 'menu-item-image';
                    const imagePath = getImagePath(category, item);
                    if (imagePath) {
                        img.src = imagePath;
                        img.alt = item;
                        img.onerror = function() { this.style.display = 'none'; };
                    }
                    div.appendChild(img);
                    const itemDetails = getItemDetails();
                    const normalizedKey = normalizeName(item);
                    const details = itemDetails[normalizedKey];
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'menu-item-name';
                    nameDiv.textContent = item;
                    div.appendChild(nameDiv);
                    if (details && details.price) {
                        const priceDiv = document.createElement('div');
                        priceDiv.className = 'menu-item-price';
                        priceDiv.textContent = details.price;
                        div.appendChild(priceDiv);
                    }
                    if (details) {
                        div.addEventListener('click', function() { showModal(item, details); });
                    } else {
                        div.style.cursor = 'default';
                    }
                    return div;
                }

                function createCategorySection(category, items) {
                    const section = document.createElement('section');
                    section.className = 'category';
                    const categoryId = category.replace(/\s+/g, '-').toLowerCase();
                    section.id = `category-${categoryId}`;
                    const title = document.createElement('h2');
                    title.className = 'category-title';
                    const dashedKey = category.replace(/\s+/g, '-');
                    title.innerHTML = `<span class="category-header" data-category-key="${dashedKey}">${formatCategoryName(category)}</span>`;
                    section.appendChild(title);
                    const grid = document.createElement('div');
                    grid.className = 'menu-grid';
                    items.forEach(item => {
                        const menuItem = createMenuItem(category, item);
                        grid.appendChild(menuItem);
                    });
                    section.appendChild(grid);
                    return section;
                }

                const COCKTAILS = ['клубничный алиби', 'pina colada', 'long island'];

                // === ИСПРАВЛЕННАЯ ФУНКЦИЯ ДЛЯ АЛКОГОЛЬНЫХ НАПИТКОВ ===
                function makeAlcoholicItem(item) {
                    const div = document.createElement('div');
                    div.className = 'menu-item';
                    const img = document.createElement('img');
                    img.className = 'menu-item-image';
                    
                    // Mapping item names to English image filenames
                    const alcoholImgMap = {
                        'клубничный алиби': 'strawberry alibi'
                    };
                    const fileName = alcoholImgMap[item] || item;
                    img.src = `menu_images/drinks/alcoholic-drinks/${fileName}.jpg`;
                    img.alt = item;
                    img.onerror = function() { this.style.display = 'none'; };
                    div.appendChild(img);
                    
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'menu-item-name';
                    nameDiv.textContent = item;
                    div.appendChild(nameDiv);
                    
                    // Поиск деталей с улучшенной нормализацией
                    const details = getItemDetails()[normalizeName(item)];
                    if (details && details.price) {
                        const priceDiv = document.createElement('div');
                        priceDiv.className = 'menu-item-price';
                        priceDiv.textContent = details.price;
                        div.appendChild(priceDiv);
                    }
                    if (details) {
                        div.addEventListener('click', function() { showModal(item, details); });
                    } else {
                        div.style.cursor = 'default';
                    }
                    return div;
                }

                function initCategoryFilter() {
                    const navButtons = document.querySelectorAll('.category-nav-item');
                    const sections = document.querySelectorAll('.category');
                    navButtons.forEach(button => {
                        button.addEventListener('click', function(e) {
                            e.preventDefault();
                            const category = this.getAttribute('data-category');
                            navButtons.forEach(btn => btn.classList.remove('active'));
                            this.classList.add('active');
                            sections.forEach(section => {
                                if (category === 'all') {
                                    section.style.display = 'block';
                                } else {
                                    const sectionId = section.id.replace('category-', '');
                                    section.style.display = (sectionId === category) ? 'block' : 'none';
                                }
                            });
                            setTimeout(() => {
                                const container = document.getElementById('menu-container');
                                if (container) container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }, 100);
                        });
                    });
                }

                    const languageDropdown = document.getElementById('languageDropdown');
                    const languageMenu = document.getElementById('languageMenu');
                    const currentFlag = document.getElementById('currentFlag');
                    const currentCode = document.getElementById('currentCode');
                    const languageOptions = document.querySelectorAll('.language-option');
                    let currentLang = localStorage.getItem('tavola-verde-lang') || 'eng';
                    function updateLanguageDisplay(lang) {
                        const flagMap = { 'eng': '🇬🇧', 'rus': '🇷🇺', 'kaz': '🇰🇿' };
                        const codeMap = { 'eng': 'ENG', 'rus': 'RUS', 'kaz': 'KAZ' };
                        currentFlag.textContent = flagMap[lang];
                        currentCode.textContent = codeMap[lang];
                        languageOptions.forEach(opt => opt.classList.toggle('active', opt.getAttribute('data-lang') === lang));
                    }
                    function applyTranslations(lang) {
                        const trans = translations[lang];
                        if (!trans) return;
                        document.querySelector('.subtitle').textContent = trans.subtitle;
                        document.querySelectorAll('[data-category-key]').forEach(el => { const key = el.getAttribute('data-category-key'); if (trans.categories[key]) el.textContent = trans.categories[key]; });
                        document.querySelectorAll('.category-nav-item').forEach(btn => { const key = btn.getAttribute('data-category'); if (key === 'all') btn.textContent = trans.all; else if (trans.categories[key]) btn.textContent = trans.categories[key]; });
                        document.querySelectorAll('[data-drink-key]').forEach(el => { const key = el.getAttribute('data-drink-key'); if (trans.drinkCategories[key]) el.textContent = trans.drinkCategories[key]; });
                        document.querySelector('footer p').textContent = trans.footerText;
                        const navLinks = document.querySelectorAll('.navbar-menu a');
                        if (navLinks.length >= 4) { navLinks[0].textContent = trans.quickLinks.home; navLinks[1].textContent = trans.quickLinks.about; navLinks[2].textContent = trans.quickLinks.reviews; navLinks[3].textContent = trans.quickLinks.menu; }
                    }
                    languageDropdown.addEventListener('click', (e) => { e.stopPropagation(); languageMenu.classList.toggle('active'); languageDropdown.classList.toggle('active'); });
                    document.addEventListener('click', () => { languageMenu.classList.remove('active'); languageDropdown.classList.remove('active'); });
                    languageMenu.addEventListener('click', (e) => e.stopPropagation());
                    languageOptions.forEach(option => {
                        option.addEventListener('click', () => {
                            const lang = option.getAttribute('data-lang');
                            currentLang = lang;
                            localStorage.setItem('tavola-verde-lang', lang);
                            updateLanguageDisplay(lang);
                            applyTranslations(lang);
                        });
                    });
                    updateLanguageDisplay(currentLang);
                    applyTranslations(currentLang);
                    const categoryNav = document.getElementById('categoryNav');
                    let isDown = false, startX, scrollLeft;
                    if (categoryNav) {
                        categoryNav.addEventListener('touchstart', (e) => { isDown = true; startX = e.touches[0].pageX - categoryNav.offsetLeft; scrollLeft = categoryNav.scrollLeft; }, { passive: true });
                        categoryNav.addEventListener('touchmove', (e) => { if (!isDown) return; const x = e.touches[0].pageX - categoryNav.offsetLeft; categoryNav.scrollLeft = scrollLeft - (x - startX) * 1.5; }, { passive: true });
                        categoryNav.addEventListener('touchend', () => { isDown = false; });
                    }
                    const modal = document.getElementById('descriptionModal');
                    function closeModal() { modal.classList.remove('active'); document.body.style.overflow = ''; }
                    document.getElementById('modalClose').addEventListener('click', closeModal);
                    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
                    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal(); });
                });
            </script>
